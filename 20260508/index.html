<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>KOMA-NATSU Web</title>
<meta name="keywords" content="貓咪,喵咪,喵星人,貓咪介紹,曬貓">
<meta name="description" content="介紹我家的貓咪們！還有大量可愛的貓照片。">
<link href="style.css" rel="stylesheet" media="all">
<link href="https://fonts.googleapis.com/css?family=Limelight" rel="stylesheet">
</head>

<body>
<header>
  <h1>KOMA-NATSU Web</h1>
  <p>曬一下你家的可愛貓咪吧♪</p>
</header>
<form id="entryForm" action="#" method="post">
<main id="contents">
   <p><strong><span class="require">*</span>為必填項目。</strong></p>
   <table class="entryTable">
    <caption>貓咪資料</caption>
    <tr>
    <th>貓咪名*</th>
    <td><input type="text" name="cat-name" id=""required autofocus></td>
    </tr>
    <tr>
    <th>年齡*</th>
    <td>
      <select name="age" required>
        <option value=""select>請選擇</option>
        <option value="0">未滿1歲</option>
        <option value="1">1~5歲</option>
        <option value="2">6~10歲</option>
        <option value="3">11~15歲</option>
        <option value="4">16~20歲</option>
        <option value="5">20歲以上</option>
        <option value="6">不明</option>
      </select>
    </td>
    </tr>
    <tr>
    <th>性別</th>
    <td>
      <input type="radio" name="sex" id="male"  value="m" checked>
      <label for="male">男生</label>
      <input type="radio" name="sex" id="female" value="f">
      <label for="female">女生</label>
    </td>
    </tr>
    <tr>
    <th>最愛的食物</th>
    <td>
      <input type="checkbox" name="favorite" id="fish" value="1">
      <label for="fish">魚</label>
      <input type="checkbox" name="favorite" id="meat" value="2">
      <label for="meat">肉</label>
      <input type="checkbox" name="favorite" id="feed" value="3">
      <label for="feed">乾飼料</label>
      <input type="checkbox" name="favorite" id="canned" value="4">
      <label for="canned">貓罐頭</label>
      <input type="checkbox" name="favorite" id="meat paste" value="5">
      <label for="meat paste">肉泥</label>
      <input type="checkbox" name="favorite" id="other" value="6">
      <label for="other">其他</label>
    </td>
    </tr>
    <tr>
    <th>照片*</th>
    <td>
      <input type="file" name="photo"required>
    </td>
    </tr>
   </table>
    <table class="entryTable">
    <caption>飼主資料</caption>
    <tr>
    <th>飼主名*</th>
    <td><input type="text" name="name" id=""required placeholder="黑貓小町">
      <br>
      <small>*可用暱稱</small>
    </td>
    </tr>
    <tr>
    <th>E-Mail*</th>
    <td><input type="email" name="email" id=""required placeholder="sample@gmail.com">
    <br>
    <small>*請輸半形文字</small>
  </td>
    </tr>
    <tr>
    <th>留言</th>
    <td><textarea name="content" rows="4" cols="40"></textarea></td>
    </tr>
    </table>
    <div class="entryBtn">
    <input type="reset" value="清除重填">
    <input type="submit" value="送出">
  </div>
    </form>
</main>

<footer>
  <p><small>Copyright © KOMA-NATSU Web All Rights Reserved.</small></p>
</footer>
</body>
</html>
