<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>KOMA-NATSU Web</title>
<meta name="keywords" content="貓咪,喵咪,喵星人,貓咪介紹,曬貓">
<meta name="description" content="介紹我家的貓咪們！還有大量可愛的貓照片。">
<link href="style.css" rel="stylesheet" media="all">
<link href="https://fonts.googleapis.com/css?family=Limelight" rel="stylesheet">
<style>@charset "utf-8";

/*視窗背景色設定*/
body {
  background: #fbf9cc url(img/bg.png) repeat-x;
}

/*連結顏色設定*/
a {
  color: #df4839;
}
a:hover {
  color: #ff705b;
  text-decoration: none;
}

/*頁首,導航,頁尾的共通設定*/
header,nav,footer {
  text-align: center;
}

/*頁面標題設定*/
h1 {
  width: 300px;
  margin: 40px auto;
  padding: 30px;
  border: 5px solid #95dbbd;
  background-color: #6fbb9a;
  color: #fff;
  font-size: 300%;
  text-align: center;
  line-height: 1;
  border-radius: 50%;
  text-shadow: 1px 1px 2px #307657;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  background-image: linear-gradient(to bottom, #6fbb9a, #4a9d79);
  font-family: 'Limelight', cursive;
}

/*內容區塊邊框設定*/
#contents {
  width: 798px;
  margin: 40px auto;
  padding: 40px 80px;
  border: 1px solid #f6bb9a;
  background-color: #fff;
}

.entryTable{
  width: 100%;
  margin-bottom: 30px;
  border: 2px solid #f6bb9e;
  border-collapse: collapse;
}
.entryTable th,
.entryTable td{
  padding: 10px 20px;
  border: 1px solid #f6bb9e;
}
.entryTable th{
  width: 10em;
  background-color: #ffeeee;
  text-align: left;
}
.entryTable caption{
  margin-bottom: 10px;
}

.entryTable input[type="text"],
.entryTable input[type="email"],
.entryTable textarea{
  width: 100%;
  padding: 10px;
  border: 1px solid rgb(17, 17, 17);
  box-sizing: border-box;
  font-size: 1em;
}
.entryTable input[type="text"]:focus,
.entryTable input[type="email"]:focus,
.entryTable textarea :focus{
  background-color: #fbf9cc;
  border-left:7px solid #ff705b;
  outline: none;
}
input,
label,
select,
textarea{
  cursor: pointer;
}
.entryBtn{
  text-align: center;
}

.entryBtn input{
  width: 200px;
  padding: 10px;
  background-color: white;
  border: 2px solid orange;
  border-radius: 10px;
  font-size: 1em;
  margin: 0px 10px;
}
.entryBtn input[type="submit"]{
  background: #fadccc;
}

.entryBtn input:hover {
  opacity: 0.7;
}</style>
</head>

<body>
<header>
  <h1>KOMA-NATSU Web</h1>
  <p>曬一下你家的可愛貓咪吧♪</p>
</header>
<form id="entryForm" action="#" method="post">
<main id="contents">
   <p><strong><span class="require">*</span>為必填項目。</strong></p>
   <table class="entryTable">
    <caption>貓咪資料</caption>
    <tr>
    <th>貓咪名</th>
    <td><input type="text" name="cat-name" id=""></td>
    </tr>
    <tr>
    <th>年齡</th>
    <td></td>
    </tr>
    <tr>
    <th>性別</th>
    <td></td>
    </tr>
    <tr>
    <th>最愛的食物</th>
    <td></td>
    </tr>
    <tr>
    <th>照片</th>
    <td></td>
    </tr>
   </table>
    <table class="entryTable">
    <caption>飼主資料</caption>
    <tr>
    <th>飼主名</th>
    <td><input type="text" name="name" id=""></td>
    </tr>
    <tr>
    <th>E-Mail</th>
    <td><input type="email" name="email" id=""></td>
    </tr>
    <tr>
    <th>留言</th>
    <td></td>
    </tr>
    </table>
    <input type="reset" value="清除重填">
    <input type="submit" value="送出">
    </form>
</main>

<footer>
  <p><small>Copyright © KOMA-NATSU Web All Rights Reserved.</small></p>
</footer>
</body>
</html>
